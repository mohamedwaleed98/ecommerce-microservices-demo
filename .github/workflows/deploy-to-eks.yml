name: Update Kubernetes Manifests

on:
  workflow_run:
    workflows: ["Build and Push Images to ECR"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifests:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      ECR_REGISTRY: 746227194679.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update catalogue-db image tag
        run: |
          sed -i "s|image: .*catalogue-db:.*|image: $ECR_REGISTRY/catalogue-db:$IMAGE_TAG|g" deploy/k8s/catalogue-db-deploy.yaml

      - name: Update catalogue image tag
        run: |
          sed -i "s|image: .*catalogue:.*|image: $ECR_REGISTRY/catalogue:$IMAGE_TAG|g" deploy/k8s/catalogue-deploy.yaml

      - name: Update front-end image tag
        run: |
          sed -i "s|image: .*front-end:.*|image: $ECR_REGISTRY/front-end:$IMAGE_TAG|g" deploy/k8s/frontend-deploy.yaml

      - name: Show changed files
        run: |
          git diff -- deploy/k8s/

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy/k8s/catalogue-db-deploy.yaml deploy/k8s/catalogue-deploy.yaml deploy/k8s/frontend-deploy.yaml
          git diff --cached --quiet || git commit -m "Update image tags to $IMAGE_TAG"

      - name: Push changes
        run: |
          git push origin main