name: Build and Push Images to ECR

on:
  push:
    branches:
      - main
    paths:
      - "app/front-end/**"
      - "app/catalogue/**"
      - ".github/workflows/build-and-push-ecr.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 746227194679.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::746227194679:role/GitHubActionsEcrPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if catalogue-db image tag exists
        id: check_catalogue_db
        run: |
          if aws ecr describe-images \
            --repository-name catalogue-db \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push catalogue-db
        if: steps.check_catalogue_db.outputs.exists == 'false'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/catalogue-db:$IMAGE_TAG \
            -f app/catalogue/docker/catalogue-db/Dockerfile \
            app/catalogue/docker/catalogue-db \
            --push

      - name: Skip catalogue-db push if tag exists
        if: steps.check_catalogue_db.outputs.exists == 'true'
        run: echo "catalogue-db:$IMAGE_TAG already exists, skipping push"

      - name: Check if catalogue image tag exists
        id: check_catalogue
        run: |
          if aws ecr describe-images \
            --repository-name catalogue \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push catalogue
        if: steps.check_catalogue.outputs.exists == 'false'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/catalogue:$IMAGE_TAG \
            -f app/catalogue/docker/catalogue/Dockerfile \
            app/catalogue \
            --push

      - name: Skip catalogue push if tag exists
        if: steps.check_catalogue.outputs.exists == 'true'
        run: echo "catalogue:$IMAGE_TAG already exists, skipping push"

      - name: Check if front-end image tag exists
        id: check_frontend
        run: |
          if aws ecr describe-images \
            --repository-name front-end \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push front-end
        if: steps.check_frontend.outputs.exists == 'false'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/front-end:$IMAGE_TAG \
            -f app/front-end/Dockerfile \
            app/front-end \
            --push

      - name: Skip front-end push if tag exists
        if: steps.check_frontend.outputs.exists == 'true'
        run: echo "front-end:$IMAGE_TAG already exists, skipping push"