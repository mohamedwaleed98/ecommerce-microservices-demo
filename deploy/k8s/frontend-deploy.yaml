apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
    spec:
      containers:
        - name: front-end
          image: 746227194679.dkr.ecr.us-east-1.amazonaws.com/front-end:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8079